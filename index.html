<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Selecionar Grade — PDV Go</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --red: #e01d25;
    --grey-950: #262626;
    --grey-900: #29272b;
    --grey-700: #4f4f4f;
    --grey-500: #6d6d6d;
    --grey-100: #e7e7e7;
    --grey-50: #f9f9fa;
    --grey-25: #f7f8f8;
    --bg: #f5f5f5;
    --blue: #1c57b1;
    --blue-radio: #066fde;
    --green: #37701b;
    --orange-bg: #fff8ed;
    --orange-fg: #482000;
    --white: #ffffff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background:#dcdcdc;
    color:var(--grey-950);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }

  /* Frame do "celular" — 480px é a largura de design do Figma */
  #frame{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:var(--bg);
    position:relative;
    overflow-x:hidden;
    box-shadow:0 0 40px rgba(0,0,0,0.15);
  }

  /* ---------- Header ---------- */
  header{
    background:var(--red);
    height:72px;
    display:flex;
    align-items:center;
    padding:0 24px;
    position:sticky;
    top:0;
    z-index:20;
  }
  header .row{
    display:flex; align-items:center; justify-content:space-between; width:100%;
  }
  .logo{
    display:flex; align-items:center; gap:3px;
    background:var(--white); border-radius:4px; padding:12px 9px;
    border:none; cursor:pointer;
  }
  .logo .pdv{ font-size:11px; font-weight:800; color:#767676; letter-spacing:0.2px; }
  .logo .go{
    background:var(--red); color:var(--white); font-size:11px; font-weight:800;
    border-radius:28px; padding:1px 5px; line-height:13px;
  }
  .user-block{ display:flex; align-items:center; gap:8px; }
  .user-text{
    display:flex; align-items:center; gap:8px; white-space:nowrap;
    font-size:14px; color:rgba(255,255,255,0.95);
  }
  .user-text b{ font-weight:500; }
  .user-text .dot{ opacity:0.7; }
  .menu-btn{
    background:none; border:none; color:var(--white); cursor:pointer;
    width:40px; height:40px; display:flex; align-items:center; justify-content:center;
    border-radius:6px;
  }
  .menu-btn:active{ background:rgba(255,255,255,0.15); }

  /* ---------- Main ---------- */
  main{
    display:flex; flex-direction:column; gap:24px;
    padding:24px; padding-bottom:140px;
  }

  .card{
    background:var(--white);
    border:1px solid var(--grey-100);
    border-radius:4px;
    overflow:hidden;
    box-shadow:0px 6px 10px 0px rgba(0,0,0,0.05);
  }
  .card-top{
    background:var(--grey-50);
    border-bottom:1px solid var(--grey-100);
    padding:16px;
    display:flex; align-items:center; justify-content:center;
  }
  .card-top p{ margin:0; font-size:16px; font-weight:500; color:var(--grey-950); flex:1; }

  .card-body{ padding:24px; display:flex; flex-direction:column; gap:16px; }
  .field{ display:flex; flex-direction:column; gap:8px; }
  .field label{ font-size:16px; color:var(--grey-900); }
  .field input{
    height:44px; border-radius:3px; border:1px solid var(--grey-100);
    padding:12px 8px; font-size:16px; color:var(--grey-950); width:100%;
    font-family:inherit; background:var(--white);
  }
  .field input.filled{ border:2px solid var(--grey-700); }
  .field input:focus{ outline:none; border-color:var(--grey-700); }

  .btn-consultar{
    background:var(--grey-500); color:var(--white); border:none;
    border-radius:4px; padding:12px 24px; font-size:16px; width:100%;
    font-family:inherit; cursor:pointer; transition:background .15s ease;
  }
  .btn-consultar:active{ background:#5a5a5a; }

  /* ---------- Lista de resultados ---------- */
  .results{ display:flex; flex-direction:column; gap:16px; width:100%; }
  .results-count{ margin:0; font-size:16px; font-weight:500; color:var(--grey-700); }

  .product-list{
    border:1px solid var(--grey-100); border-radius:4px; overflow:hidden;
    box-shadow:0px 6px 10px 0px rgba(0,0,0,0.05);
  }

  .product{
    width:100%; text-align:left; background:var(--white); border:none;
    border-bottom:1px solid var(--grey-100);
    padding:20px 16px; display:flex; flex-direction:column; gap:16px;
    cursor:pointer; font-family:inherit;
  }
  .product:last-child{ border-bottom:none; }
  .product:active{ background:#fafafa; }

  .product-top{ display:flex; align-items:center; gap:8px; width:100%; }
  .thumb{
    width:70px; height:70px; border-radius:4.8px; flex-shrink:0;
    background:#eceff1; overflow:hidden;
  }
  .thumb img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .info{ flex:1; display:flex; flex-direction:column; gap:8px; min-width:0; }
  .info-row{ display:flex; align-items:flex-start; gap:8px; width:100%; }
  .code-chip{ display:flex; align-items:center; gap:8px; flex:1; min-width:0; }
  .code-chip .code{ font-size:14px; color:var(--grey-500); white-space:nowrap; }
  .code-chip .supplier{
    border:1px solid var(--grey-100); border-radius:4px; height:18px;
    display:flex; align-items:center; padding:0 9px; font-size:12px; color:var(--grey-500);
    white-space:nowrap;
  }
  .price{ font-size:14px; color:var(--grey-500); white-space:nowrap; text-align:right; }
  .product-name{ margin:0; font-size:14px; font-weight:500; color:var(--grey-950); line-height:1.25; }

  .variacao{ display:flex; align-items:center; gap:8px; }
  .radio{
    width:18px; height:18px; border-radius:50%; border:2px solid #b6bbbc;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .product.selected .radio{ border-color:var(--blue-radio); }
  .radio .dot{
    width:9px; height:9px; border-radius:50%; background:var(--blue-radio);
    display:none;
  }
  .product.selected .radio .dot{ display:block; }
  .variacao span{ font-size:14px; color:var(--grey-500); }

  .meta-row{ display:flex; align-items:center; justify-content:space-between; font-size:14px; width:100%; }
  .meta-row .label{ color:var(--grey-500); }
  .meta-row .value{ color:var(--blue); font-weight:500; margin-left:6px; }
  .meta-group{ display:flex; align-items:center; }

  .previsao{
    width:100%; background:var(--grey-50); border-radius:10px; padding:12px 16px;
    display:flex; flex-direction:column; gap:4px;
  }
  .previsao .top{ display:flex; align-items:center; gap:8px; font-size:14px; font-weight:500; color:#3d3d3d; }
  .previsao .bottom{ display:flex; align-items:center; justify-content:space-between; font-size:14px; color:var(--grey-500); }
  .previsao .bottom .g{ display:flex; gap:8px; align-items:center; }

  /* ---------- Paginação ---------- */
  .pagination{ display:flex; align-items:center; justify-content:center; width:100%; gap:2px; }
  .pagination button{
    height:38px; min-width:40px; border-radius:4px; border:none; background:none;
    font-size:16px; color:var(--grey-500); cursor:pointer; font-family:inherit;
    display:flex; align-items:center; justify-content:center;
  }
  .pagination button.active{ background:#3d3d3d; color:var(--white); }
  .pagination button:disabled{ opacity:0.3; cursor:default; }
  .pagination button.nav{ color:var(--grey-950); }
  .pagination .dots{ min-width:40px; height:38px; display:flex; align-items:center; justify-content:center; color:var(--grey-500); }

  /* ---------- Barra inferior "Adicionar ao Pedido" ---------- */
  /* Some após selecionar uma grade, surgindo de baixo pra cima. */
  #order-bar{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(100%);
    width:100%; max-width:480px; background:var(--white);
    padding:24px; z-index:15;
    box-shadow:0px -4px 5px 0px rgba(0,0,0,0.05);
    transition:transform .25s ease;
    opacity:0;
  }
  #order-bar.visible{ transform:translateX(-50%) translateY(0); opacity:1; }
  #order-bar button{
    width:100%; background:var(--green); color:var(--white); border:none;
    border-radius:4px; padding:12px 24px; font-size:16px; font-family:inherit;
    cursor:pointer;
  }
  #order-bar button:active{ background:#2c5a15; }

  /* ---------- Drawer / menu lateral ---------- */
  #overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.35);
    display:none; z-index:30;
  }
  #overlay.visible{ display:block; }
  #drawer{
    position:fixed; top:0; right:-100%; width:82%; max-width:378px; height:100%;
    background:var(--white); z-index:31; transition:right .25s ease;
    padding:32px 24px; display:flex; flex-direction:column; gap:32px;
    overflow-y:auto;
  }
  #drawer.visible{ right:0; }
  .drawer-close{
    position:absolute; top:24px; right:24px; background:none; border:none;
    color:var(--grey-500); cursor:pointer; padding:4px;
  }
  .drawer-top{ display:flex; flex-direction:column; gap:16px; }
  .badge-loja{
    align-self:flex-start; background:var(--grey-50); border-radius:4px;
    padding:2px 10px; font-size:14px; color:var(--grey-900);
  }
  .drawer-name{ margin:4px 0 0; font-size:24px; font-weight:500; color:var(--grey-950); }
  .drawer-user{ margin:0; font-size:16px; color:#979797; }
  .saldo{
    display:flex; align-items:center; gap:8px; background:var(--orange-bg);
    border-radius:8px; padding:4px 8px;
  }
  .saldo .coin{ width:24px; height:24px; border-radius:50%; background:#f5c46b; }
  .saldo .txt{ font-size:16px; color:var(--grey-950); }
  .saldo .val{ font-weight:500; color:var(--orange-fg); }
  .drawer-btn{
    width:100%; background:var(--grey-25); border:1px solid var(--grey-100);
    border-radius:4px; padding:12px 24px; font-size:16px; color:var(--grey-950);
    font-family:inherit; cursor:pointer; text-align:center;
  }
  .drawer-btn:active{ background:#eff0f0; }

  @media (min-width:481px){
    #frame{ min-height:100vh; }
    body{ padding:24px 0; }
  }
</style>
</head>
<body>

<div id="frame">

  <header>
    <div class="row">
      <button class="logo" id="btn-voltar" aria-label="Voltar">
        <span class="pdv">PDV</span>
        <span class="go">GO</span>
      </button>
      <div class="user-block">
        <div class="user-text">
          <b>ingridtavora</b>
          <span class="dot">•</span>
          <span>O2 (PH)</span>
        </div>
        <button class="menu-btn" id="btn-menu" aria-label="Abrir menu">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="card">
      <div class="card-top"><p>Consultar Estoque</p></div>
      <form class="card-body" id="form-consulta">
        <div class="field">
          <label for="codigo">Código Produto:</label>
          <input id="codigo" type="text" placeholder="Digite o código" />
        </div>
        <div class="field">
          <label for="descricao">Descrição Produto:</label>
          <input id="descricao" type="text" class="filled" value="Guarda Roupa" />
        </div>
        <div class="field">
          <label for="ref">Ref. Fabricante:</label>
          <input id="ref" type="text" placeholder="Opcional" />
        </div>
        <button type="submit" class="btn-consultar">Consultar</button>
      </form>
    </section>

    <section class="results">
      <p class="results-count" id="results-count">A busca retornou 12 registro(s).</p>
      <div class="product-list" id="product-list"></div>
      <nav class="pagination" id="pagination" aria-label="Paginação de resultados"></nav>
    </section>
  </main>

  <div id="order-bar">
    <button id="btn-adicionar">Adicionar ao Pedido</button>
  </div>

  <div id="overlay"></div>
  <aside id="drawer">
    <button class="drawer-close" id="btn-close-drawer" aria-label="Fechar menu">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <div class="drawer-top">
      <div>
        <span class="badge-loja">Loja 02 | PH</span>
        <p class="drawer-name">Ingrid Ferreira Tavora</p>
        <p class="drawer-user">ingridtavora</p>
      </div>
      <div class="saldo">
        <div class="coin"></div>
        <div class="txt">Saldo desconto: <span class="val">R$ 4.000,00</span></div>
      </div>
    </div>
    <button class="drawer-btn">Catálogo</button>
    <button class="drawer-btn">Pesquisar mostruário</button>
  </aside>

</div>

<script>
  // ---------------------------------------------------------------------
  // Dados mock — troque pela resposta real da API de consulta de estoque
  // ---------------------------------------------------------------------
  const PRODUTOS = [
    { id:1, codigo:"028025", fornecedor:"FRITZ", nome:"GUARDA ROUPA BABY 2PTS PC", variacao:"BRANCO", preco:279.00, estoqueLoja:8, disponivel:256, previsao:{data:"08/06/2026", pedido:"4500082169", qtd:150}, imagem:"images/028025.png" },
    { id:2, codigo:"29200929", fornecedor:"NOTAVEL", nome:"GUARDA ROUPA NT 6010", variacao:"FREIJO", preco:569.97, estoqueLoja:2, disponivel:248, imagem:"images/29200929-FREIJO.png" },
    { id:3, codigo:"29200929", fornecedor:"NOTAVEL", nome:"GUARDA ROUPA NT 6010", variacao:"FREIJO/OFF WHITE", preco:569.97, estoqueLoja:0, disponivel:200, imagem:"images/29200929-FREIJO-OFF-WHITE.png" },
    { id:4, codigo:"033014", fornecedor:"IMOP", nome:"GUARDA ROUPA MEGA 6PTS C/PE", variacao:"BRANCO NEVE", preco:498.99, estoqueLoja:2, disponivel:178, imagem:"images/033014.png" },
    { id:5, codigo:"043057", fornecedor:"ACP", nome:"PECA DE GUARDA ROUPA ALAM 4PTS MOGNO", variacao:"UNICA", preco:488.93, estoqueLoja:2, disponivel:163, imagem:"images/043057.png" },
    { id:6, codigo:"043107", fornecedor:"ACP", nome:"GUARDA ROUPA PRIMULA 3PTS C/ESPELHO PC", variacao:"BRANCO/AZUL/ROSA", preco:812.12, estoqueLoja:2, disponivel:163, previsao:{data:"08/06/2026", pedido:"4500082169", qtd:150}, imagem:"images/043107-BRANCOAZULROSA.png" },
    { id:7, codigo:"043107", fornecedor:"ACP", nome:"GUARDA ROUPA PRIMULA 3PTS C/ESPELHO PC", variacao:"BRANCO/BRANCO/MAPLE", preco:812.12, estoqueLoja:2, disponivel:158, imagem:"images/043107-BRANCO-BRANC0-MAPLE.png" },
    { id:8, codigo:"043107", fornecedor:"ACP", nome:"GUARDA ROUPA PRIMULA 3PTS C/ESPELHO PC", variacao:"MARFIM", preco:812.12, estoqueLoja:2, disponivel:156, imagem:"images/043107.png" },
    { id:9, codigo:"043143", fornecedor:"ACP", nome:"GUARDA ROUPA DUBAI 6PTS 2PTS C/ESPELHO", variacao:"BRANCO/PRETO", preco:799.00, estoqueLoja:2, disponivel:150, imagem:"images/043143.png" },
    { id:10, codigo:"043143", fornecedor:"ACP", nome:"GUARDA ROUPA DUBAI 6PTS 2PTS C/ESPELHO", variacao:"CINZA/PRETO", preco:799.00, estoqueLoja:2, disponivel:148, imagem:"images/043143-CINZA-PRETO.png" },
    { id:11, codigo:"043143", fornecedor:"ACP", nome:"GUARDA ROUPA DUBAI 6PTS 2PTS C/ESPELHO", variacao:"IMBUIA/PRETO", preco:799.00, estoqueLoja:2, disponivel:148, imagem:"images/043143-IMBUIA-PRETO.png" },
    { id:12, codigo:"043143", fornecedor:"ACP", nome:"GUARDA ROUPA DUBAI 6PTS 2PTS C/ESPELHO", variacao:"IPE/AMENDOA", preco:799.00, estoqueLoja:2, disponivel:148, imagem:"images/043143-IPE-AMENDOA.png" },
  ];
  const TOTAL_PAGINAS = 10;

  let paginaAtual = 1;
  let selecionadoId = null;

  const fmt = (v) => v.toLocaleString('pt-BR', { style:'currency', currency:'BRL' });

  // ---------------------------------------------------------------------
  // Render lista de produtos
  // ---------------------------------------------------------------------
  function renderProdutos(){
    const list = document.getElementById('product-list');
    list.innerHTML = '';
    document.getElementById('results-count').textContent =
      `A busca retornou ${PRODUTOS.length} registro(s).`;

    PRODUTOS.forEach(p => {
      const el = document.createElement('button');
      el.type = 'button';
      el.className = 'product' + (p.id === selecionadoId ? ' selected' : '');
      el.dataset.id = p.id;

      el.innerHTML = `
        <div class="product-top">
          <div class="thumb"><img src="${p.imagem}" alt="${p.nome}" loading="lazy" /></div>
          <div class="info">
            <div class="info-row">
              <div class="code-chip">
                <span class="code">${p.codigo}</span>
                <span class="supplier">${p.fornecedor}</span>
              </div>
              <span class="price">${fmt(p.preco)}</span>
            </div>
            <p class="product-name">${p.nome}</p>
            <div class="variacao">
              <span class="radio"><span class="dot"></span></span>
              <span>${p.variacao}</span>
            </div>
          </div>
        </div>
        <div class="meta-row">
          <div class="meta-group"><span class="label">Estoque Loja:</span><span class="value">${p.estoqueLoja}</span></div>
          <div class="meta-group"><span class="label">Disponível:</span><span class="value">${p.disponivel}</span></div>
        </div>
        ${p.previsao ? `
        <div class="previsao">
          <div class="top"><span>Previsão de Chegada:</span><span>${p.previsao.data}</span></div>
          <div class="bottom">
            <div class="g"><span>Pedido</span><span>${p.previsao.pedido}</span></div>
            <div class="g"><span>Qtd:</span><span>${p.previsao.qtd}</span></div>
          </div>
        </div>` : ''}
      `;

      el.addEventListener('click', () => {
        selecionadoId = (selecionadoId === p.id) ? null : p.id;
        renderProdutos();
        renderOrderBar();
      });

      list.appendChild(el);
    });
  }

  // ---------------------------------------------------------------------
  // Paginação
  // ---------------------------------------------------------------------
  function renderPagination(){
    const nav = document.getElementById('pagination');
    nav.innerHTML = '';

    const prev = document.createElement('button');
    prev.className = 'nav';
    prev.disabled = paginaAtual === 1;
    prev.setAttribute('aria-label', 'Página anterior');
    prev.innerHTML = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    prev.addEventListener('click', () => { if(paginaAtual>1){ paginaAtual--; renderPagination(); }});
    nav.appendChild(prev);

    const pages = new Set([1, TOTAL_PAGINAS, paginaAtual, paginaAtual-1, paginaAtual+1]);
    const sorted = [...pages].filter(p => p>=1 && p<=TOTAL_PAGINAS).sort((a,b)=>a-b);

    let last = null;
    sorted.forEach(p => {
      if(last !== null && p - last > 1){
        const dots = document.createElement('span');
        dots.className = 'dots';
        dots.textContent = '...';
        nav.appendChild(dots);
      }
      const btn = document.createElement('button');
      btn.textContent = p;
      if(p === paginaAtual) btn.classList.add('active');
      btn.addEventListener('click', () => { paginaAtual = p; renderPagination(); });
      nav.appendChild(btn);
      last = p;
    });

    const next = document.createElement('button');
    next.className = 'nav';
    next.disabled = paginaAtual === TOTAL_PAGINAS;
    next.setAttribute('aria-label', 'Próxima página');
    next.innerHTML = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M7.5 5L12.5 10L7.5 15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    next.addEventListener('click', () => { if(paginaAtual<TOTAL_PAGINAS){ paginaAtual++; renderPagination(); }});
    nav.appendChild(next);
  }

  // ---------------------------------------------------------------------
  // Barra inferior "Adicionar ao Pedido" — some apenas quando há seleção
  // ---------------------------------------------------------------------
  function renderOrderBar(){
    const bar = document.getElementById('order-bar');
    bar.classList.toggle('visible', selecionadoId !== null);
  }

  // ---------------------------------------------------------------------
  // Menu lateral
  // ---------------------------------------------------------------------
  const overlay = document.getElementById('overlay');
  const drawer = document.getElementById('drawer');
  function openDrawer(){ overlay.classList.add('visible'); drawer.classList.add('visible'); }
  function closeDrawer(){ overlay.classList.remove('visible'); drawer.classList.remove('visible'); }
  document.getElementById('btn-menu').addEventListener('click', openDrawer);
  document.getElementById('btn-close-drawer').addEventListener('click', closeDrawer);
  overlay.addEventListener('click', closeDrawer);

  // ---------------------------------------------------------------------
  // Formulário de consulta (front-end apenas — sem chamada real)
  // ---------------------------------------------------------------------
  document.getElementById('form-consulta').addEventListener('submit', (e) => {
    e.preventDefault();
    paginaAtual = 1;
    selecionadoId = null;
    renderProdutos();
    renderPagination();
    renderOrderBar();
    window.scrollTo({ top: 0, behavior:'smooth' });
  });

  document.getElementById('btn-adicionar').addEventListener('click', () => {
    const produto = PRODUTOS.find(p => p.id === selecionadoId);
    if(produto){
      alert(`Adicionar ao pedido: ${produto.nome} — ${produto.variacao}`);
