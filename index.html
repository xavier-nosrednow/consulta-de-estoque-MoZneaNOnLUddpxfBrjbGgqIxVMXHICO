<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Selecionar Grade — PDV Go</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>


<div id="frame">

  <header>
    <div class="row">
      <button class="logo" id="btn-voltar" aria-label="Voltar para a tela anterior">
        <span class="pdv">PDV</span>
        <span class="go">GO</span>
      </button>
      <div class="user-block">
        <div class="user-text">
          <b>ingridtavora</b>
          <span class="dot" aria-hidden="true">•</span>
          <span>O2 (PH)</span>
        </div>
        <button class="menu-btn" id="btn-menu" aria-label="Abrir menu" aria-haspopup="dialog" aria-expanded="false" aria-controls="drawer">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true" focusable="false"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main id="main-content">
    <section class="card">
      <div class="card-top"><p>Consultar Estoque</p></div>
      <form class="card-body" id="form-consulta" role="search" aria-label="Consultar estoque de produto">
        <div class="field">
          <label for="codigo">Código Produto:</label>
          <input id="codigo" type="text" placeholder="Digite o código" autocomplete="off" />
        </div>
        <div class="field">
          <label for="descricao">Descrição Produto:</label>
          <input id="descricao" type="text" placeholder="Digite a descrição" autocomplete="off" />
        </div>
        <div class="field">
          <label for="ref">Ref. Fabricante:</label>
          <input id="ref" type="text" placeholder="Opcional" autocomplete="off" />
        </div>
        <button type="submit" class="btn-consultar">Consultar</button>
      </form>
    </section>

    <section class="results" id="results" hidden aria-labelledby="results-count">
      <p class="results-count" id="results-count" role="status" aria-live="polite"></p>
      <div class="product-list" id="product-list" role="radiogroup" aria-label="Grades de produto disponíveis"></div>
      <nav class="pagination" id="pagination" aria-label="Paginação de resultados"></nav>
    </section>
  </main>

  <div id="order-bar">
    <div class="order-bar-inner">
      <button id="btn-adicionar">Adicionar ao Pedido</button>
    </div>
  </div>

  <div id="overlay" aria-hidden="true"></div>
  <aside id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title" aria-hidden="true">
    <button class="drawer-close" id="btn-close-drawer" aria-label="Fechar menu">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true" focusable="false"><path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <div class="drawer-top">
      <div>
        <span class="badge-loja">Loja 02 | PH</span>
        <p class="drawer-name" id="drawer-title">Ingrid Ferreira Tavora</p>
        <p class="drawer-user">ingridtavora</p>
      </div>
      <div class="saldo">
        <div class="coin" aria-hidden="true"></div>
        <div class="txt">Saldo desconto: <span class="val">R$ 4.000,00</span></div>
      </div>
    </div>
    <button class="drawer-btn">Catálogo</button>
    <button class="drawer-btn">Pesquisar mostruário</button>
  </aside>

  <div id="previsao-overlay" hidden></div>
  <div id="previsao-modal" role="dialog" aria-modal="true" aria-labelledby="previsao-modal-title" hidden>
    <div class="modal-header">
      <h2 id="previsao-modal-title">Previsão de Chegada</h2>
      <button type="button" class="modal-close" id="previsao-modal-close" aria-label="Fechar">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true" focusable="false"><path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="modal-produto">
        <div class="thumb"><img id="previsao-modal-imagem" src="" alt="" width="70" height="70" /></div>
        <div class="info">
          <span class="code" id="previsao-modal-codigo"></span>
          <p class="nome" id="previsao-modal-nome"></p>
          <span class="variacao-txt" id="previsao-modal-variacao"></span>
        </div>
      </div>
      <div class="modal-pedido">
        <div class="top"><span>Previsão de Chegada:</span><span id="previsao-modal-data"></span></div>
        <div class="bottom">
          <div class="g"><span>Pedido:</span><span id="previsao-modal-pedido"></span></div>
          <div class="g"><span>Qtd:</span><span id="previsao-modal-qtd"></span></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
