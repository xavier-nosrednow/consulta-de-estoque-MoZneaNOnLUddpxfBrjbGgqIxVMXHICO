<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Selecionar Grade — PDV Go</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --red: #e01d25;
    --grey-950: #262626;
    --grey-900: #29272b;
    --grey-700: #4f4f4f;
    --grey-500: #6d6d6d;
    --grey-100: #e7e7e7;
    --grey-50: #f9f9fa;
    --grey-25: #f7f8f8;
    --bg: #f5f5f5;
    --blue: #1c57b1;
    --blue-radio: #066fde;
    --green: #37701b;
    --orange-bg: #fff8ed;
    --orange-fg: #482000;
    --white: #ffffff;
    --frame-width: 480px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background:#dcdcdc;
    color:var(--grey-950);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }

  /* ---------- Acessibilidade: foco visível e skip-link ---------- */
  a, button, input, [tabindex]{ scroll-margin-top:16px; }
  :focus-visible{
    outline:3px solid var(--blue-radio);
    outline-offset:2px;
    border-radius:2px;
  }
  .skip-link{
    position:absolute; left:8px; top:-48px; z-index:100;
    background:var(--grey-950); color:var(--white); padding:10px 16px;
    border-radius:4px; text-decoration:none; font-size:14px;
    transition:top .15s ease;
  }
  .skip-link:focus{ top:8px; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
  }

  /* Frame do "celular" — 480px é a largura de design do Figma, escala em telas maiores */
  #frame{
    width:100%;
    max-width:var(--frame-width);
    min-height:100vh;
    background:var(--bg);
    position:relative;
    overflow-x:hidden;
    box-shadow:0 0 40px rgba(0,0,0,0.15);
  }

  /* ---------- Header ---------- */
  header{
    background:var(--red);
    height:72px;
    display:flex;
    align-items:center;
    padding:0 24px;
    position:sticky;
    top:0;
    z-index:20;
  }
  header .row{
    display:flex; align-items:center; justify-content:space-between; width:100%;
  }
  .logo{
    display:flex; align-items:center; gap:3px;
    background:var(--white); border-radius:4px; padding:12px 9px;
    border:none; cursor:pointer;
  }
  .logo .pdv{ font-size:11px; font-weight:800; color:#767676; letter-spacing:0.2px; }
  .logo .go{
    background:var(--red); color:var(--white); font-size:11px; font-weight:800;
    border-radius:28px; padding:1px 5px; line-height:13px;
  }
  .user-block{ display:flex; align-items:center; gap:8px; }
  .user-text{
    display:flex; align-items:center; gap:8px; white-space:nowrap;
    font-size:14px; color:rgba(255,255,255,0.95);
  }
  .user-text b{ font-weight:500; }
  .user-text .dot{ opacity:0.7; }
  .menu-btn{
    background:none; border:none; color:var(--white); cursor:pointer;
    width:40px; height:40px; display:flex; align-items:center; justify-content:center;
    border-radius:6px;
  }
  .menu-btn:active{ background:rgba(255,255,255,0.15); }

  /* ---------- Main ---------- */
  main{
    display:flex; flex-direction:column; gap:24px;
    padding:24px; padding-bottom:140px;
  }

  .card{
    background:var(--white);
    border:1px solid var(--grey-100);
    border-radius:4px;
    overflow:hidden;
    box-shadow:0px 6px 10px 0px rgba(0,0,0,0.05);
  }
  .card-top{
    background:var(--grey-50);
    border-bottom:1px solid var(--grey-100);
    padding:16px;
    display:flex; align-items:center; justify-content:center;
  }
  .card-top p{ margin:0; font-size:16px; font-weight:500; color:var(--grey-950); flex:1; }

  .card-body{ padding:24px; display:flex; flex-direction:column; gap:16px; }
  .field{ display:flex; flex-direction:column; gap:8px; }
  .field label{ font-size:16px; color:var(--grey-900); }
  .field input{
    height:44px; border-radius:3px; border:1px solid var(--grey-100);
    padding:12px 8px; font-size:16px; color:var(--grey-950); width:100%;
    font-family:inherit; background:var(--white);
  }
  .field input.filled{ border:2px solid var(--grey-700); }
  .field input:focus-visible{ outline:none; border-color:var(--grey-700); box-shadow:0 0 0 3px rgba(6,111,222,0.25); }

  .btn-consultar{
    background:var(--grey-500); color:var(--white); border:none;
    border-radius:4px; padding:12px 24px; font-size:16px; width:100%;
    font-family:inherit; cursor:pointer; transition:background .15s ease;
  }
  .btn-consultar:active{ background:#5a5a5a; }

  /* ---------- Lista de resultados ---------- */
  .results{ display:flex; flex-direction:column; gap:16px; width:100%; }
  .results-count{ margin:0; font-size:16px; font-weight:500; color:var(--grey-700); }

  .product-list{
    border:1px solid var(--grey-100); border-radius:4px; overflow:hidden;
    box-shadow:0px 6px 10px 0px rgba(0,0,0,0.05);
  }

  .product{
    width:100%; text-align:left; background:var(--white); border:none;
    border-bottom:1px solid var(--grey-100);
    padding:20px 16px; display:flex; flex-direction:column; gap:16px;
    cursor:pointer; font-family:inherit;
  }
  .product:last-child{ border-bottom:none; }
  .product:active{ background:#fafafa; }

  .product-top{ display:flex; align-items:center; gap:8px; width:100%; }
  .thumb{
    width:70px; height:70px; border-radius:4.8px; flex-shrink:0;
    background:#eceff1; overflow:hidden;
  }
  .thumb img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .info{ flex:1; display:flex; flex-direction:column; gap:8px; min-width:0; }
  .info-row{ display:flex; align-items:flex-start; gap:8px; width:100%; }
  .code-chip{ display:flex; align-items:center; gap:8px; flex:1; min-width:0; }
  .code-chip .code{ font-size:14px; color:var(--grey-500); white-space:nowrap; }
  .code-chip .supplier{
    border:1px solid var(--grey-100); border-radius:4px; height:18px;
    display:flex; align-items:center; padding:0 9px; font-size:12px; color:var(--grey-500);
    white-space:nowrap;
  }
  .price{ font-size:14px; color:var(--grey-500); white-space:nowrap; text-align:right; }
  .product-name{ margin:0; font-size:14px; font-weight:500; color:var(--grey-950); line-height:1.25; }

  .variacao{ display:flex; align-items:center; gap:8px; }
  .radio{
    width:18px; height:18px; border-radius:50%; border:2px solid #b6bbbc;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .product.selected .radio{ border-color:var(--blue-radio); }
  .radio .dot{
    width:9px; height:9px; border-radius:50%; background:var(--blue-radio);
    display:none;
  }
  .product.selected .radio .dot{ display:block; }
  .variacao span{ font-size:14px; color:var(--grey-500); }

  .meta-row{ display:flex; align-items:center; justify-content:space-between; font-size:14px; width:100%; }
  .meta-row .label{ color:var(--grey-500); }
  .meta-row .value{ color:var(--blue); font-weight:500; margin-left:6px; }
  .meta-group{ display:flex; align-items:center; }

  .previsao{
    width:100%; background:var(--grey-50); border-radius:10px; padding:12px 16px;
    display:flex; flex-direction:column; gap:4px;
  }
  .previsao .top{ display:flex; align-items:center; gap:8px; font-size:14px; font-weight:500; color:#3d3d3d; }
  .previsao .bottom{ display:flex; align-items:center; justify-content:space-between; font-size:14px; color:var(--grey-500); }
  .previsao .bottom .g{ display:flex; gap:8px; align-items:center; }

  /* ---------- Badge de Disponibilidade Futura ---------- */
  .badge-disponibilidade{
    display:inline-flex; align-items:center; gap:4px; width:fit-content;
    background:var(--white); border:1px solid var(--grey-100); border-radius:4px;
    padding:2px 10px; font-size:14px; line-height:1.25;
  }
  .badge-disponibilidade .label{ color:var(--grey-950); }
  .badge-disponibilidade .data{ color:#d1040c; }

  /* ---------- Paginação ---------- */
  .pagination{ display:flex; align-items:center; justify-content:center; width:100%; gap:2px; }
  .pagination button{
    height:38px; min-width:40px; border-radius:4px; border:none; background:none;
    font-size:16px; color:var(--grey-500); cursor:pointer; font-family:inherit;
    display:flex; align-items:center; justify-content:center;
  }
  .pagination button.active{ background:#3d3d3d; color:var(--white); }
  .pagination button:disabled{ opacity:0.3; cursor:default; }
  .pagination button.nav{ color:var(--grey-950); }
  .pagination .dots{ min-width:40px; height:38px; display:flex; align-items:center; justify-content:center; color:var(--grey-500); }

  /* ---------- Barra inferior "Adicionar ao Pedido" ---------- */
  /* Some após selecionar uma grade, surgindo de baixo pra cima. */
  #order-bar{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(100%);
    width:100%; max-width:var(--frame-width); background:var(--white);
    padding:24px; z-index:15;
    box-shadow:0px -4px 5px 0px rgba(0,0,0,0.05);
    transition:transform .25s ease;
    opacity:0;
  }
  #order-bar.visible{ transform:translateX(-50%) translateY(0); opacity:1; }
  #order-bar button{
    width:100%; background:var(--green); color:var(--white); border:none;
    border-radius:4px; padding:12px 24px; font-size:16px; font-family:inherit;
    cursor:pointer;
  }
  #order-bar button:active{ background:#2c5a15; }

  /* ---------- Drawer / menu lateral ---------- */
  #overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.35);
    display:none; z-index:30;
  }
  #overlay.visible{ display:block; }
  #drawer{
    position:fixed; top:0; right:-100%; width:82%; max-width:378px; height:100%;
    background:var(--white); z-index:31; transition:right .25s ease;
    padding:32px 24px; display:flex; flex-direction:column; gap:32px;
    overflow-y:auto;
  }
  #drawer.visible{ right:0; }
  .drawer-close{
    position:absolute; top:24px; right:24px; background:none; border:none;
    color:var(--grey-500); cursor:pointer; padding:4px;
  }
  .drawer-top{ display:flex; flex-direction:column; gap:16px; }
  .badge-loja{
    align-self:flex-start; background:var(--grey-50); border-radius:4px;
    padding:2px 10px; font-size:14px; color:var(--grey-900);
  }
  .drawer-name{ margin:4px 0 0; font-size:24px; font-weight:500; color:var(--grey-950); }
  .drawer-user{ margin:0; font-size:16px; color:#979797; }
  .saldo{
    display:flex; align-items:center; gap:8px; background:var(--orange-bg);
    border-radius:8px; padding:4px 8px;
  }
  .saldo .coin{ width:24px; height:24px; border-radius:50%; background:#f5c46b; }
  .saldo .txt{ font-size:16px; color:var(--grey-950); }
  .saldo .val{ font-weight:500; color:var(--orange-fg); }
  .drawer-btn{
    width:100%; background:var(--grey-25); border:1px solid var(--grey-100);
    border-radius:4px; padding:12px 24px; font-size:16px; color:var(--grey-950);
    font-family:inherit; cursor:pointer; text-align:center;
  }
  .drawer-btn:active{ background:#eff0f0; }

  /* ---------- Responsivo: tablet e desktop ---------- */
  @media (min-width:481px){
    #frame{ min-height:100vh; }
    body{ padding:24px 0; }
  }

  @media (min-width:640px){
    :root{ --frame-width: 640px; }
    main{ padding:32px; gap:32px; }
    .card-body{ padding:32px; }
    header{ padding:0 32px; }
    .thumb{ width:84px; height:84px; }
  }

  @media (min-width:1024px){
    :root{ --frame-width: 960px; }
    main{ padding:40px; }
    .product-list{
      display:grid; grid-template-columns:1fr 1fr; gap:16px;
      border:none; box-shadow:none;
    }
    .product{
      border:1px solid var(--grey-100); border-radius:8px;
      box-shadow:0px 6px 10px 0px rgba(0,0,0,0.05);
    }
    #drawer{ max-width:420px; }
  }
</style>
</head>

<a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>


<div id="frame">

  <header>
    <div class="row">
      <button class="logo" id="btn-voltar" aria-label="Voltar para a tela anterior">
        <span class="pdv">PDV</span>
        <span class="go">GO</span>
      </button>
      <div class="user-block">
        <div class="user-text">
          <b>ingridtavora</b>
          <span class="dot" aria-hidden="true">•</span>
          <span>O2 (PH)</span>
        </div>
        <button class="menu-btn" id="btn-menu" aria-label="Abrir menu" aria-haspopup="dialog" aria-expanded="false" aria-controls="drawer">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true" focusable="false"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main id="main-content">
    <section class="card">
      <div class="card-top"><p>Consultar Estoque</p></div>
      <form class="card-body" id="form-consulta" role="search" aria-label="Consultar estoque de produto">
        <div class="field">
          <label for="codigo">Código Produto:</label>
          <input id="codigo" type="text" placeholder="Digite o código" autocomplete="off" />
        </div>
        <div class="field">
          <label for="descricao">Descrição Produto:</label>
          <input id="descricao" type="text" placeholder="Digite a descrição" autocomplete="off" />
        </div>
        <div class="field">
          <label for="ref">Ref. Fabricante:</label>
          <input id="ref" type="text" placeholder="Opcional" autocomplete="off" />
        </div>
        <button type="submit" class="btn-consultar">Consultar</button>
      </form>
    </section>

    <section class="results" id="results" hidden aria-labelledby="results-count">
      <p class="results-count" id="results-count" role="status" aria-live="polite"></p>
      <div class="product-list" id="product-list" role="radiogroup" aria-label="Grades de produto disponíveis"></div>
      <nav class="pagination" id="pagination" aria-label="Paginação de resultados"></nav>
    </section>
  </main>

  <div id="order-bar">
    <button id="btn-adicionar">Adicionar ao Pedido</button>
  </div>

  <div id="overlay" aria-hidden="true"></div>
  <aside id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title" aria-hidden="true">
    <button class="drawer-close" id="btn-close-drawer" aria-label="Fechar menu">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true" focusable="false"><path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <div class="drawer-top">
      <div>
        <span class="badge-loja">Loja 02 | PH</span>
        <p class="drawer-name" id="drawer-title">Ingrid Ferreira Tavora</p>
        <p class="drawer-user">ingridtavora</p>
      </div>
      <div class="saldo">
        <div class="coin" aria-hidden="true"></div>
        <div class="txt">Saldo desconto: <span class="val">R$ 4.000,00</span></div>
      </div>
    </div>
    <button class="drawer-btn">Catálogo</button>
    <button class="drawer-btn">Pesquisar mostruário</button>
  </aside>

</div>

  ];
  const TOTAL_PAGINAS = 10;

  let paginaAtual = 1;
  let selecionadoId = null;
  let produtosFiltrados = [];

  const fmt = (v) => v.toLocaleString('pt-BR', { style:'currency', currency:'BRL' });

  // ---------------------------------------------------------------------
  // Busca — front-end apenas. Regras:
  // - Código Produto preenchido -> filtra pelas grades daquele código
  // - Descrição Produto preenchida (e código vazio) -> filtra pelo nome
  // ---------------------------------------------------------------------
  function buscarProdutos(){
    const codigo = document.getElementById('codigo').value.trim().toLowerCase();
    const descricao = document.getElementById('descricao').value.trim().toLowerCase();

    if (codigo) {
      produtosFiltrados = PRODUTOS.filter(p => p.codigo.toLowerCase().includes(codigo));
    } else if (descricao) {
      produtosFiltrados = PRODUTOS.filter(p => p.nome.toLowerCase().includes(descricao));
    } else {
      produtosFiltrados = [];
    }
  }

  // ---------------------------------------------------------------------
  // Render lista de produtos
  // ---------------------------------------------------------------------
  function renderProdutos(){
    const list = document.getElementById('product-list');
    list.innerHTML = '';
    document.getElementById('results-count').textContent =
      produtosFiltrados.length > 0
        ? `A busca retornou ${produtosFiltrados.length} registro(s).`
        : `Nenhum registro encontrado.`;

    produtosFiltrados.forEach((p, index) => {
      const el = document.createElement('button');
      el.type = 'button';
      el.className = 'product' + (p.id === selecionadoId ? ' selected' : '');
      el.dataset.id = p.id;
      el.setAttribute('role', 'radio');
      el.setAttribute('aria-checked', p.id === selecionadoId ? 'true' : 'false');

      el.innerHTML = `
        <div class="product-top">
          <div class="thumb"><img src="${p.imagem}" alt="" width="70" height="70" loading="lazy" /></div>
          <div class="info">
            <div class="info-row">
              <div class="code-chip">
                <span class="code">${p.codigo}</span>
                <span class="supplier">${p.fornecedor}</span>
              </div>
              <span class="price">${fmt(p.preco)}</span>
            </div>
            <p class="product-name">${p.nome}</p>
            <div class="variacao">
              <span class="radio" aria-hidden="true"><span class="dot"></span></span>
              <span>${p.variacao}</span>
            </div>
          </div>
        </div>
        <div class="meta-row">
          <div class="meta-group"><span class="label">Estoque Loja:</span><span class="value">${p.estoqueLoja}</span></div>
          <div class="meta-group"><span class="label">Disponível:</span><span class="value">${p.disponivel}</span></div>
        </div>
        ${p.disponibilidadeFutura ? `
        <div class="badge-disponibilidade">
          <span class="label">Disponibilidade: </span><span class="data">${p.disponibilidadeFutura}</span>
        </div>` : ''}
        ${p.previsao ? `
        <div class="previsao">
          <div class="top"><span>Previsão de Chegada:</span><span>${p.previsao.data}</span></div>
          <div class="bottom">
            <div class="g"><span>Pedido</span><span>${p.previsao.pedido}</span></div>
            <div class="g"><span>Qtd:</span><span>${p.previsao.qtd}</span></div>
          </div>
        </div>` : ''}
      `;

      el.addEventListener('click', () => {
        selecionadoId = (selecionadoId === p.id) ? null : p.id;
        renderProdutos();
        renderOrderBar();
      });

      // Navegação por setas entre as grades (padrão de radiogroup)
      el.addEventListener('keydown', (e) => {
        if (!['ArrowDown','ArrowUp','ArrowLeft','ArrowRight'].includes(e.key)) return;
        e.preventDefault();
        const dir = (e.key === 'ArrowDown' || e.key === 'ArrowRight') ? 1 : -1;
        const nextIndex = (index + dir + produtosFiltrados.length) % produtosFiltrados.length;
        selecionadoId = produtosFiltrados[nextIndex].id;
        renderProdutos();
        renderOrderBar();
        const buttons = document.querySelectorAll('#product-list .product');
        if (buttons[nextIndex]) buttons[nextIndex].focus();
      });

      list.appendChild(el);
    });
  }

  // ---------------------------------------------------------------------
  // Paginação
  // ---------------------------------------------------------------------
  function renderPagination(){
    const nav = document.getElementById('pagination');
    nav.innerHTML = '';

    if (produtosFiltrados.length < 12) {
      nav.hidden = true;
      return;
    }
    nav.hidden = false;

    const prev = document.createElement('button');
    prev.className = 'nav';
    prev.disabled = paginaAtual === 1;
    prev.setAttribute('aria-label', 'Página anterior');
    prev.innerHTML = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true" focusable="false"><path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    prev.addEventListener('click', () => { if(paginaAtual>1){ paginaAtual--; renderPagination(); }});
    nav.appendChild(prev);

    const pages = new Set([1, TOTAL_PAGINAS, paginaAtual, paginaAtual-1, paginaAtual+1]);
    const sorted = [...pages].filter(p => p>=1 && p<=TOTAL_PAGINAS).sort((a,b)=>a-b);

    let last = null;
    sorted.forEach(p => {
      if(last !== null && p - last > 1){
        const dots = document.createElement('span');
        dots.className = 'dots';
        dots.textContent = '...';
        dots.setAttribute('aria-hidden', 'true');
        nav.appendChild(dots);
      }
      const btn = document.createElement('button');
      btn.textContent = p;
      btn.setAttribute('aria-label', `Ir para página ${p}`);
      if(p === paginaAtual){
        btn.classList.add('active');
        btn.setAttribute('aria-current', 'page');
      }
      btn.addEventListener('click', () => { paginaAtual = p; renderPagination(); });
      nav.appendChild(btn);
      last = p;
    });

    const next = document.createElement('button');
    next.className = 'nav';
    next.disabled = paginaAtual === TOTAL_PAGINAS;
    next.setAttribute('aria-label', 'Próxima página');
    next.innerHTML = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true" focusable="false"><path d="M7.5 5L12.5 10L7.5 15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    next.addEventListener('click', () => { if(paginaAtual<TOTAL_PAGINAS){ paginaAtual++; renderPagination(); }});
    nav.appendChild(next);
  }

  // ---------------------------------------------------------------------
  // Barra inferior "Adicionar ao Pedido" — some apenas quando há seleção
  // ---------------------------------------------------------------------
  function renderOrderBar(){
    const bar = document.getElementById('order-bar');
    bar.classList.toggle('visible', selecionadoId !== null);
  }

  // ---------------------------------------------------------------------
  // Menu lateral (diálogo modal acessível)
  // ---------------------------------------------------------------------
  const overlay = document.getElementById('overlay');
  const drawer = document.getElementById('drawer');
  const btnMenu = document.getElementById('btn-menu');
  const headerEl = document.querySelector('header');
  const mainEl = document.querySelector('main');
  const orderBarEl = document.getElementById('order-bar');
  let lastFocusedBeforeDrawer = null;

  function getFocusableInDrawer(){
    return drawer.querySelectorAll('button, [href], input, [tabindex]:not([tabindex="-1"])');
  }

  function onDrawerKeydown(e){
    if (e.key === 'Escape') {
      closeDrawer();
      return;
    }
    if (e.key === 'Tab') {
      const focusables = getFocusableInDrawer();
      if (focusables.length === 0) return;
      const first = focusables[0];
      const last = focusables[focusables.length - 1];
      if (e.shiftKey && document.activeElement === first) {
        e.preventDefault();
        last.focus();
      } else if (!e.shiftKey && document.activeElement === last) {
        e.preventDefault();
        first.focus();
      }
    }
  }

  function openDrawer(){
    lastFocusedBeforeDrawer = document.activeElement && document.activeElement !== document.body
      ? document.activeElement
      : btnMenu;
    overlay.classList.add('visible');
    drawer.classList.add('visible');
    drawer.removeAttribute('aria-hidden');
    btnMenu.setAttribute('aria-expanded', 'true');
    headerEl.setAttribute('inert', '');
    mainEl.setAttribute('inert', '');
    orderBarEl.setAttribute('inert', '');
    document.addEventListener('keydown', onDrawerKeydown);
    document.getElementById('btn-close-drawer').focus();
  }

  function closeDrawer(){
    overlay.classList.remove('visible');
    drawer.classList.remove('visible');
    drawer.setAttribute('aria-hidden', 'true');
    btnMenu.setAttribute('aria-expanded', 'false');
    headerEl.removeAttribute('inert');
    mainEl.removeAttribute('inert');
    orderBarEl.removeAttribute('inert');
    document.removeEventListener('keydown', onDrawerKeydown);
    if (lastFocusedBeforeDrawer) lastFocusedBeforeDrawer.focus();
  }

  btnMenu.addEventListener('click', openDrawer);
  document.getElementById('btn-close-drawer').addEventListener('click', closeDrawer);
  overlay.addEventListener('click', closeDrawer);

  // ---------------------------------------------------------------------
  // Formulário de consulta (front-end apenas — sem chamada real)
  // ---------------------------------------------------------------------
  document.getElementById('form-consulta').addEventListener('submit', (e) => {
    e.preventDefault();
    paginaAtual = 1;
    selecionadoId = null;
    buscarProdutos();
    renderProdutos();
    renderPagination();
    renderOrderBar();

    const results = document.getElementById('results');
    const temFiltro = document.getElementById('codigo').value.trim() !== '' ||
                       document.getElementById('descricao').value.trim() !== '';
    results.hidden = !temFiltro;

    if (temFiltro) {
      window.scrollTo({ top: document.querySelector('.card').offsetHeight, behavior:'smooth' });
    }
  });

  document.getElementById('btn-adicionar').addEventListener('click', () => {
    const produto = PRODUTOS.find(p => p.id === selecionadoId);
    if(produto){
      alert(`Adicionar ao pedido: ${produto.nome} — ${produto.variacao}`);
      // Aqui entra a navegação real, ex: window.location.href = 'adicionar-ao-pedido.html'
    }
  });

  document.getElementById('btn-voltar').addEventListener('click', () => {
    // Aqui entra a navegação real para a tela anterior do fluxo
    console.log('voltar');
  });

  // ---------------------------------------------------------------------
  // Init — tela inicial mostra somente o card de consulta
  // ---------------------------------------------------------------------
  renderOrderBar();
</script>

</body>
</html>
